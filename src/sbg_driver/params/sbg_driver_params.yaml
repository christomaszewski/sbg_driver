sbg_driver:
  transport:
    # The device is opened once in on_activate, so transport settings cannot
    # take effect mid-run. Marked read_only: set-at-launch-only (a runtime set
    # is rejected rather than silently no-op'ing).
    type:
      type: string
      default_value: "file"
      description: "Transport: 'serial', 'udp', or 'file' (replay)"
      read_only: true
      validation:
        one_of<>: [["serial", "udp", "file"]]
    file:
      path:
        type: string
        default_value: ""
        description: "Path to .bin replay file (used when transport.type=file)"
        read_only: true
      real_time_pace:
        type: bool
        default_value: true
        description: "Pace replay to original recording rate"
        read_only: true
    serial:
      port:
        type: string
        default_value: "/dev/ttyUSB0"
        description: "Serial device path (Linux) or COM name (Windows)"
        read_only: true
      baud:
        type: int
        default_value: 921600
        description: "Serial baud rate"
        read_only: true
        validation:
          one_of<>: [[9600, 19200, 38400, 57600, 115200, 230400, 460800, 921600]]
    udp:
      remote_ip:
        type: string
        default_value: "192.168.1.20"
        description: "Remote device IP address"
        read_only: true
      in_port:
        type: int
        default_value: 1234
        description: "Local UDP listen port"
        read_only: true
        validation:
          bounds<>: [1, 65535]
      out_port:
        type: int
        default_value: 5678
        description: "Remote UDP port"
        read_only: true
        validation:
          bounds<>: [1, 65535]

  frames:
    imu:
      type: string
      default_value: "imu_link"
      description: "TF frame ID for IMU + magnetometer + barometer outputs"
    gps:
      type: string
      default_value: "gps_link"
      description: "TF frame ID for GNSS outputs (NavSatFix, gps velocity, etc.)"
    time_reference:
      type: string
      default_value: ""
      description: "frame_id for sensor_msgs/TimeReference (empty = global time)"
    base:
      type: string
      default_value: "base_link"
      description: "TF frame ID of the vehicle base"
    odom:
      type: string
      default_value: "odom"
      description: "TF frame ID of the odom frame"
    map:
      type: string
      default_value: "map"
      description: "TF frame ID of the map frame"

  imu:
    sensor_model:
      type: string
      default_value: "custom"
      description: >-
        Sensor tier used to look up approximate accel/gyro noise defaults for
        the /imu/data covariance. 'custom' uses the explicit *_noise_stddev
        params below (or leaves covariance unknown if those are <0). Per-model
        defaults are rough datasheet-derived starting points - refine for your
        unit.
      validation:
        one_of<>: [["custom", "ellipse", "pulse", "ekinox", "apogee", "quanta"]]
    accel_noise_stddev:
      type: double
      default_value: -1.0
      description: >-
        Per-axis accelerometer 1σ noise in m/s². Overrides the sensor_model
        default when >= 0. Covariance diagonal = stddev². <0 => unknown.
    gyro_noise_stddev:
      type: double
      default_value: -1.0
      description: >-
        Per-axis gyroscope 1σ noise in rad/s. Overrides the sensor_model
        default when >= 0. Covariance diagonal = stddev². <0 => unknown.

  convention:
    use_enu:
      type: bool
      default_value: false
      description: >-
        Convert sensor-native NED outputs to ENU per REP-103. Most ROS nav
        stacks (nav2, robot_localization) assume ENU and will produce wrong
        results with NED data. Default false (sensor-native); flip to true
        for typical ROS pipelines.

  topics:
    imu_data:
      type: string
      default_value: "imu/data"
      description: "sensor_msgs/Imu output topic"
    imu_temperature:
      type: string
      default_value: "imu/temperature"
      description: "sensor_msgs/Temperature from IMU board temp"
    mag:
      type: string
      default_value: "imu/mag"
      description: "sensor_msgs/MagneticField output topic"
    nav_sat_fix:
      type: string
      default_value: "gps/fix"
      description: "sensor_msgs/NavSatFix output topic"
    time_reference:
      type: string
      default_value: "time_reference"
      description: "sensor_msgs/TimeReference output topic (sensor UTC clock)"
    odom:
      type: string
      default_value: "odom"
      description: "nav_msgs/Odometry output topic (composed from EKF Nav+Quat+VelBody)"
    sbg_status:
      type: string
      default_value: "sbg/status"
      description: "sbg_msgs/Status output topic - device general/com/aiding bitmasks"
    sbg_ekf_status:
      type: string
      default_value: "sbg/ekf_status"
      description: "sbg_msgs/EkfStatus output topic - INS solution mode + aiding bits"
    sbg_air_data_status:
      type: string
      default_value: "sbg/air_data_status"
      description: "sbg_msgs/AirDataStatus - validity bits from the air-data sensor"
    sbg_event:
      type: string
      default_value: "sbg/event"
      description: "sbg_msgs/Event - GPIO sync-in events (A through E)"
    sbg_gps_raw:
      type: string
      default_value: "sbg/gps_raw"
      description: "sbg_msgs/GpsRaw - raw GNSS observable blob for PPP/RTK post-processing"
    sbg_mag_calib:
      type: string
      default_value: "sbg/mag_calib"
      description: "sbg_msgs/MagCalib - mag-calibration snapshot used by /sbg/*_mag_calibration"
    sbg_ship_motion:
      type: string
      default_value: "sbg/ship_motion"
      description: "sbg_msgs/ShipMotion - marine surge/sway/heave motion"

  tf:
    broadcast_odom_to_base:
      type: bool
      default_value: true
      description: >-
        Broadcast TF: frames.odom -> frames.base derived from each Odometry
        emission. Disable if a downstream node (e.g. robot_localization)
        provides the transform.
    broadcast_map_to_odom:
      type: bool
      default_value: false
      description: >-
        Broadcast TF: frames.map -> frames.odom from geodetic position.
        Disabled by default - robot_localization typically owns this.
    broadcast_base_to_imu:
      type: bool
      default_value: false
      description: >-
        Broadcast static TF: frames.base -> frames.imu. Disabled by default;
        URDF/xacro should declare the sensor mount geometry.
