name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  ROS_DISTRO: lyrical
  COLCON_DEFAULTS: --event-handlers console_direct+

jobs:
  # ---------------------------------------------------------------------------
  # Build the CI image and push to GHCR. All downstream jobs pull from this so
  # they share an identical toolchain.
  # ---------------------------------------------------------------------------
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sbg_driver-ci
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile.ci
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          load: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ROS_DISTRO=${{ env.ROS_DISTRO }}

  # ---------------------------------------------------------------------------
  # Build + test all packages inside the CI image.
  # ---------------------------------------------------------------------------
  build-test:
    needs: image
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/sbg_driver-ci:sha-${{ github.sha }}
      options: --user root
    steps:
      - uses: actions/checkout@v4
        with:
          path: src/sbg_driver_workspace

      - name: rosdep install (skip-keys covers in-workspace deps)
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          rosdep update --rosdistro=${ROS_DISTRO} || true
          rosdep install --from-paths src --ignore-src -r -y \
            --skip-keys "sbg_driver sbg_driver_core sbg_msgs" || true

      - name: colcon build
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          colcon build ${COLCON_DEFAULTS} \
            --cmake-args -DCMAKE_BUILD_TYPE=Release \
                          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: colcon test
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          source install/setup.bash
          colcon test ${COLCON_DEFAULTS} --return-code-on-test-failure
          colcon test-result --verbose

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: log/

  # ---------------------------------------------------------------------------
  # Lint pass: clang-format check, ament_lint_auto suite.
  # ---------------------------------------------------------------------------
  lint:
    needs: image
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/sbg_driver-ci:sha-${{ github.sha }}
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: clang-format
        run: |
          find src -type f \( -name '*.hpp' -o -name '*.cpp' -o -name '*.h' -o -name '*.cc' \) \
            -not -path '*/build/*' -not -path '*/install/*' \
            -print0 | xargs -0 -r clang-format --dry-run -Werror --style=file

  # ---------------------------------------------------------------------------
  # AddressSanitizer + UndefinedBehaviorSanitizer.
  # ---------------------------------------------------------------------------
  asan:
    needs: image
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/sbg_driver-ci:sha-${{ github.sha }}
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: colcon build (ASan/UBSan)
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          colcon build ${COLCON_DEFAULTS} \
            --cmake-args -DCMAKE_BUILD_TYPE=Debug \
                          -DSBG_ENABLE_ASAN=ON

      - name: colcon test
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=0:print_stacktrace=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=0
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          source install/setup.bash
          colcon test ${COLCON_DEFAULTS} --return-code-on-test-failure
          colcon test-result --verbose
